name: Build Whisper SDK

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      create_release:
        description: "Create a GitHub Release for this run"
        required: false
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-linux-x86_64:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y build-essential cmake ninja-build

      - name: Configure CMake
        run: |
          cmake -S . -B build/linux -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="${GITHUB_WORKSPACE}/install/linux" \
            -DBUILD_SHARED_LIBS=ON \
            -DWHISPER_USE_SYSTEM_GGML=ON \
            -DWHISPER_BUILD_TESTS=OFF \
            -DWHISPER_BUILD_EXAMPLES=OFF \
            -DWHISPER_BUILD_SERVER=OFF

      - name: Build
        run: cmake --build build/linux --config Release -j "$(nproc)"

      - name: Install
        run: cmake --install build/linux --config Release

      - name: Stage whisper SDK
        shell: bash
        run: |
          set -euo pipefail

          build_root="build/linux"
          install_root="install/linux"
          stage="artifact/whisper-linux-x86_64-sdk"
          archive="artifact/whisper-sdk-linux-x86_64.tar.gz"

          rm -rf "$stage" "$archive"
          mkdir -p artifact
          cp -a "$install_root" "$stage"

          config_file="$stage/lib/cmake/whisper/whisper-config.cmake"
          perl -0pi -e 's/find_package\(ggml REQUIRED HINTS \$\{LLAMA_LIB_DIR\}\/cmake\)/find_package(ggml CONFIG REQUIRED)/g' "$config_file"

          ggml_release_base_url="$(grep '^GGML_RELEASE_BASE_URL:STRING=' "$build_root/CMakeCache.txt" | cut -d= -f2-)"
          ggml_release_tag="$(grep '^GGML_RELEASE_TAG:STRING=' "$build_root/CMakeCache.txt" | cut -d= -f2-)"
          whisper_upstream_tag="$(grep '^WHISPER_UPSTREAM_TAG:STRING=' "$build_root/CMakeCache.txt" | cut -d= -f2-)"
          ggml_release_page="${ggml_release_base_url/\/releases\/download/\/releases\/tag}/${ggml_release_tag}"

          cat > "$stage/SDK-METADATA.txt" <<EOF
          name=whisper
          platform=linux-x86_64
          whisper_upstream_tag=${whisper_upstream_tag}
          ggml_release_base_url=${ggml_release_base_url}
          ggml_release_tag=${ggml_release_tag}
          consume_note=Install the matching ggml SDK separately and expose both roots via CMAKE_PREFIX_PATH or set ggml_DIR explicitly.
          EOF

          cat > "$stage/README.sdk.txt" <<EOF
          This SDK contains the prebuilt whisper shared library, headers,
          and CMake/pkg-config metadata.

          Download the matching ggml SDK separately from:
          ${ggml_release_page}

          To consume both SDKs from CMake, add both roots to CMAKE_PREFIX_PATH
          or set ggml_DIR explicitly before resolving whisper.
          EOF

          cp LICENSE "$stage/LICENSE.project"
          if [ -f "$build_root/_deps/whisper-src/LICENSE" ]; then
            cp "$build_root/_deps/whisper-src/LICENSE" "$stage/LICENSE.whisper.cpp"
          fi

          test -f "$stage/include/whisper.h"
          test -f "$stage/lib/cmake/whisper/whisper-config.cmake"
          grep -q 'find_package(ggml CONFIG REQUIRED)' "$stage/lib/cmake/whisper/whisper-config.cmake"
          ls "$stage/lib"/libwhisper* >/dev/null 2>&1

          tar czf "$archive" -C artifact whisper-linux-x86_64-sdk

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: whisper-sdk-linux-x86_64
          path: artifact/whisper-sdk-linux-x86_64.tar.gz
          if-no-files-found: error

  build-macos-arm64:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install cmake ninja

      - name: Configure CMake
        run: |
          cmake -S . -B build/macos -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_BUILD_WITH_INSTALL_RPATH=ON \
            -DCMAKE_INSTALL_RPATH="@loader_path" \
            -DCMAKE_INSTALL_PREFIX="${GITHUB_WORKSPACE}/install/macos" \
            -DBUILD_SHARED_LIBS=ON \
            -DWHISPER_USE_SYSTEM_GGML=ON \
            -DWHISPER_BUILD_TESTS=OFF \
            -DWHISPER_BUILD_EXAMPLES=OFF \
            -DWHISPER_BUILD_SERVER=OFF

      - name: Build
        run: cmake --build build/macos --config Release -j "$(sysctl -n hw.ncpu)"

      - name: Install
        run: cmake --install build/macos --config Release

      - name: Stage whisper SDK
        shell: bash
        run: |
          set -euo pipefail

          build_root="build/macos"
          install_root="install/macos"
          stage="artifact/whisper-macos-arm64-sdk"
          archive="artifact/whisper-sdk-macos-arm64.tar.gz"

          rm -rf "$stage" "$archive"
          mkdir -p artifact
          cp -a "$install_root" "$stage"

          config_file="$stage/lib/cmake/whisper/whisper-config.cmake"
          perl -0pi -e 's/find_package\(ggml REQUIRED HINTS \$\{LLAMA_LIB_DIR\}\/cmake\)/find_package(ggml CONFIG REQUIRED)/g' "$config_file"

          ggml_release_base_url="$(grep '^GGML_RELEASE_BASE_URL:STRING=' "$build_root/CMakeCache.txt" | cut -d= -f2-)"
          ggml_release_tag="$(grep '^GGML_RELEASE_TAG:STRING=' "$build_root/CMakeCache.txt" | cut -d= -f2-)"
          whisper_upstream_tag="$(grep '^WHISPER_UPSTREAM_TAG:STRING=' "$build_root/CMakeCache.txt" | cut -d= -f2-)"
          ggml_release_page="${ggml_release_base_url/\/releases\/download/\/releases\/tag}/${ggml_release_tag}"

          cat > "$stage/SDK-METADATA.txt" <<EOF
          name=whisper
          platform=macos-arm64
          whisper_upstream_tag=${whisper_upstream_tag}
          ggml_release_base_url=${ggml_release_base_url}
          ggml_release_tag=${ggml_release_tag}
          consume_note=Install the matching ggml SDK separately and expose both roots via CMAKE_PREFIX_PATH or set ggml_DIR explicitly.
          EOF

          cat > "$stage/README.sdk.txt" <<EOF
          This SDK contains the prebuilt whisper shared library, headers,
          and CMake/pkg-config metadata.

          Download the matching ggml SDK separately from:
          ${ggml_release_page}

          To consume both SDKs from CMake, add both roots to CMAKE_PREFIX_PATH
          or set ggml_DIR explicitly before resolving whisper.
          EOF

          cp LICENSE "$stage/LICENSE.project"
          if [ -f "$build_root/_deps/whisper-src/LICENSE" ]; then
            cp "$build_root/_deps/whisper-src/LICENSE" "$stage/LICENSE.whisper.cpp"
          fi

          test -f "$stage/include/whisper.h"
          test -f "$stage/lib/cmake/whisper/whisper-config.cmake"
          grep -q 'find_package(ggml CONFIG REQUIRED)' "$stage/lib/cmake/whisper/whisper-config.cmake"
          ls "$stage/lib"/libwhisper* >/dev/null 2>&1

          tar czf "$archive" -C artifact whisper-macos-arm64-sdk

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: whisper-sdk-macos-arm64
          path: artifact/whisper-sdk-macos-arm64.tar.gz
          if-no-files-found: error

  build-windows-x86_64:
    runs-on: windows-2025
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Add msbuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Configure CMake
        shell: pwsh
        run: |
          cmake -S . -B build/windows -A x64 `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_INSTALL_PREFIX="${env:GITHUB_WORKSPACE}\install\windows" `
            -DBUILD_SHARED_LIBS=ON `
            -DWHISPER_USE_SYSTEM_GGML=ON `
            -DWHISPER_BUILD_TESTS=OFF `
            -DWHISPER_BUILD_EXAMPLES=OFF `
            -DWHISPER_BUILD_SERVER=OFF

      - name: Build
        shell: pwsh
        run: cmake --build build/windows --config Release -j $env:NUMBER_OF_PROCESSORS

      - name: Install
        shell: pwsh
        run: cmake --install build/windows --config Release

      - name: Stage whisper SDK
        shell: pwsh
        run: |
          $buildRoot = "build/windows"
          $installRoot = "install/windows"
          $stage = "artifact/whisper-windows-x86_64-sdk"
          $archive = "artifact/whisper-sdk-windows-x86_64.zip"

          if (Test-Path $stage) {
            Remove-Item -LiteralPath $stage -Recurse -Force
          }
          if (Test-Path $archive) {
            Remove-Item -LiteralPath $archive -Force
          }

          New-Item -ItemType Directory -Force -Path "artifact" | Out-Null
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item -Path (Join-Path $installRoot '*') -Destination $stage -Recurse -Force

          $configFile = Join-Path $stage "lib/cmake/whisper/whisper-config.cmake"
          $configContent = Get-Content -Path $configFile -Raw
          $configContent = $configContent.Replace(
            'find_package(ggml REQUIRED HINTS ${LLAMA_LIB_DIR}/cmake)',
            'find_package(ggml CONFIG REQUIRED)'
          )
          $utf8NoBom = New-Object System.Text.UTF8Encoding($false)
          [System.IO.File]::WriteAllText((Resolve-Path $configFile), $configContent, $utf8NoBom)

          function Get-CacheValue([string]$Key) {
            $match = Select-String -Path "$buildRoot/CMakeCache.txt" -Pattern "^${Key}:.*=(.*)$"
            if (-not $match) {
              return ""
            }
            return $match.Matches[0].Groups[1].Value
          }

          $ggmlReleaseBaseUrl = Get-CacheValue "GGML_RELEASE_BASE_URL"
          $ggmlReleaseTag = Get-CacheValue "GGML_RELEASE_TAG"
          $whisperUpstreamTag = Get-CacheValue "WHISPER_UPSTREAM_TAG"
          $ggmlReleasePage = ($ggmlReleaseBaseUrl -replace '/releases/download$', '/releases/tag') + "/$ggmlReleaseTag"

          $metadata = @"
          name=whisper
          platform=windows-x86_64
          whisper_upstream_tag=$whisperUpstreamTag
          ggml_release_base_url=$ggmlReleaseBaseUrl
          ggml_release_tag=$ggmlReleaseTag
          consume_note=Install the matching ggml SDK separately and expose both roots via CMAKE_PREFIX_PATH or set ggml_DIR explicitly.
          "@
          [System.IO.File]::WriteAllText((Join-Path (Resolve-Path $stage) "SDK-METADATA.txt"), $metadata, $utf8NoBom)

          $readme = @"
          This SDK contains the prebuilt whisper shared library, headers,
          and CMake/pkg-config metadata.

          Download the matching ggml SDK separately from:
          $ggmlReleasePage

          To consume both SDKs from CMake, add both roots to CMAKE_PREFIX_PATH
          or set ggml_DIR explicitly before resolving whisper.
          "@
          [System.IO.File]::WriteAllText((Join-Path (Resolve-Path $stage) "README.sdk.txt"), $readme, $utf8NoBom)

          Copy-Item -Path LICENSE -Destination "$stage/LICENSE.project" -Force
          if (Test-Path "$buildRoot/_deps/whisper-src/LICENSE") {
            Copy-Item -Path "$buildRoot/_deps/whisper-src/LICENSE" -Destination "$stage/LICENSE.whisper.cpp" -Force
          }

          if (-not (Test-Path "$stage/include/whisper.h")) {
            Write-Error "Missing public header whisper.h"
            exit 1
          }
          if (-not (Test-Path "$stage/lib/cmake/whisper/whisper-config.cmake")) {
            Write-Error "Missing whisper-config.cmake"
            exit 1
          }
          if (-not (Select-String -Path "$stage/lib/cmake/whisper/whisper-config.cmake" -Pattern 'find_package\(ggml CONFIG REQUIRED\)' -Quiet)) {
            Write-Error "whisper-config.cmake was not patched to use ggml CONFIG REQUIRED"
            exit 1
          }
          if (-not (Test-Path "$stage/lib/whisper.lib")) {
            Write-Error "Missing import library whisper.lib"
            exit 1
          }
          if (-not (Test-Path "$stage/bin/whisper.dll")) {
            Write-Error "Missing runtime library whisper.dll"
            exit 1
          }

          Push-Location artifact
          Compress-Archive -Path "whisper-windows-x86_64-sdk" -DestinationPath "whisper-sdk-windows-x86_64.zip" -Force
          Pop-Location

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: whisper-sdk-windows-x86_64
          path: artifact/whisper-sdk-windows-x86_64.zip
          if-no-files-found: error

  release:
    needs:
      - build-linux-x86_64
      - build-macos-arm64
      - build-windows-x86_64
    runs-on: ubuntu-latest
    if: ${{ startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.create_release == true) }}
    steps:
      - name: Determine release name
        id: release_name
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "name=build-${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download packaged SDK archives
        uses: actions/download-artifact@v4
        with:
          pattern: whisper-sdk-*
          path: release/
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_name.outputs.name }}
          target_commitish: ${{ github.sha }}
          name: ${{ steps.release_name.outputs.name }}
          files: release/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
